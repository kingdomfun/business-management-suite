name: Deploy to GitHub Pages

# Build the PWA and publish it to GitHub Pages. Runs on every push to main —
# including the commits that managers make to public/config.json via the in-app
# "Publish to GitHub" button, so a published directory change redeploys the site
# (devices then pick it up on their next config check, ~5 min).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel an in-progress run if a newer push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Build under the project-site subpath, e.g. "/business-management-suite/",
      # so asset URLs resolve correctly on GitHub Pages.
      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
